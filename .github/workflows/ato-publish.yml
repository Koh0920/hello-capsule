name: Publish Capsule to Ato Store

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ato CLI (Pinned & Verified)
        env:
          ATO_VERSION: "0.3.2"
          ATO_CHECKSUM: "953d96c9f575bf052fdd09c246c89b86cb4dbc39eec02a83b454744e5b9a822a"
        run: |
          set -euo pipefail
          curl -fsSL -o ato.tar.gz "https://dl.ato.run/ato/releases/${ATO_VERSION}/ato-x86_64-unknown-linux-gnu.tar.gz"
          echo "${ATO_CHECKSUM}  ato.tar.gz" | sha256sum -c -
          tar -xzf ato.tar.gz
          chmod +x ./ato
          sudo mv ./ato /usr/local/bin/ato
          rm -f ato.tar.gz

      - name: Publish to Ato Store
        run: ato publish --ci
