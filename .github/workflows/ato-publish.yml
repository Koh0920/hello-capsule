name: Publish Capsule to Ato Store

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ato CLI (Pinned & Verified)
        env:
          ATO_VERSION: "0.3.3"
          ATO_CHECKSUM: "2186665336630dfdccab773a5e55d7b824376864f7b93f1d3bd8dd6fff735b3d"
        run: |
          set -euo pipefail
          curl -fsSL -o ato.tar.gz "https://dl.ato.run/ato/releases/${ATO_VERSION}/ato-x86_64-unknown-linux-gnu.tar.gz"
          echo "${ATO_CHECKSUM}  ato.tar.gz" | sha256sum -c -
          tar -xzf ato.tar.gz
          chmod +x ./ato
          sudo mv ./ato /usr/local/bin/ato
          rm -f ato.tar.gz

      - name: Publish to Ato Store
        run: |
          set -euo pipefail
          # Backward-compatible: old ato binaries still require a signing key file.
          # Newer keyless binaries ignore this env and continue with OIDC-only provenance.
          tmp_key="$(mktemp /tmp/ato-ci-signing-key.XXXXXX)"
          ato key gen --json --out "$tmp_key" --force >/dev/null
          ATO_SIGNING_KEY="$tmp_key" ato publish --ci
          rm -f "$tmp_key"
