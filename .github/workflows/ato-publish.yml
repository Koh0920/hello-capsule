name: Publish Capsule to Ato Store

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ato CLI (Pinned & Verified)
        env:
          ATO_VERSION: "0.3.7"
          ATO_CHECKSUM: "e622807c0ad8f573165ca752b78ea1be94c1d0f23587b6433adca18b0c43cd1d"
        run: |
          set -euo pipefail
          curl -fsSL -o ato.tar.gz "https://dl.ato.run/ato/releases/${ATO_VERSION}/ato-x86_64-unknown-linux-gnu.tar.gz"
          echo "${ATO_CHECKSUM}  ato.tar.gz" | sha256sum -c -
          tar -xzf ato.tar.gz
          chmod +x ./ato
          sudo mv ./ato /usr/local/bin/ato
          rm -f ato.tar.gz

      - name: Publish to Ato Store
        run: ato publish --ci
