name: Publish Capsule to Ato Store

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ato CLI (Pinned & Verified)
        env:
          ATO_VERSION: "0.3.0"
          ATO_CHECKSUM: "65abe57d0af5dbb5879bfafbdf66ae2f99afaa21f50ec98121b6d0f8ae95f461"
        run: |
          set -euo pipefail
          curl -fsSL -o ato.tar.gz "https://stg-dl.ato.run/ato/latest/ato-x86_64-unknown-linux-gnu.tar.gz"
          echo "${ATO_CHECKSUM}  ato.tar.gz" | sha256sum -c -
          tar -xzf ato.tar.gz
          chmod +x ./ato
          sudo mv ./ato /usr/local/bin/ato
          rm -f ato.tar.gz

      - name: Request GitHub OIDC token
        env:
          OIDC_AUDIENCE: "api.ato.run"
        run: |
          set -euo pipefail
          resp="$(curl -fsSL -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=${OIDC_AUDIENCE}")"
          token="$(printf '%s' "$resp" | python3 -c 'import json,sys; print(json.load(sys.stdin)["value"])')"
          if [ -z "$token" ]; then
            echo "Failed to acquire OIDC token" >&2
            exit 1
          fi
          echo "ATO_OIDC_TOKEN=$token" >> "$GITHUB_ENV"

      - name: Publish to Ato Store
        run: ato publish --ci
