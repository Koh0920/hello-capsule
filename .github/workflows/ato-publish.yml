name: Publish Capsule to Ato Store

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ato CLI (Pinned & Verified)
        env:
          ATO_VERSION: "0.3.4"
          ATO_CHECKSUM: "c9dd13c10bdd745f30b28bc9ee63c6f8ea184eae9f501a71337a30bdb4f53a16"
        run: |
          set -euo pipefail
          curl -fsSL -o ato.tar.gz "https://dl.ato.run/ato/releases/${ATO_VERSION}/ato-x86_64-unknown-linux-gnu.tar.gz"
          echo "${ATO_CHECKSUM}  ato.tar.gz" | sha256sum -c -
          tar -xzf ato.tar.gz
          chmod +x ./ato
          sudo mv ./ato /usr/local/bin/ato
          rm -f ato.tar.gz

      - name: Publish to Ato Store
        env:
          ATO_SIGNING_KEY_JSON: ${ secrets.ATO_SIGNING_KEY_JSON }
        run: |
          set -euo pipefail
          if [ -z "${ATO_SIGNING_KEY_JSON:-}" ]; then
            echo "Missing required secret: ATO_SIGNING_KEY_JSON"
            echo "Run local \`ato publish\` once to auto-provision it, or set manually via:"
            echo "  gh secret set ATO_SIGNING_KEY_JSON --repo <owner/repo> < ~/.capsule/keys/publisher-signing-key.json"
            exit 1
          fi
          tmp_key="$(mktemp /tmp/ato-ci-signing-key.XXXXXX)"
          printf '%s' "$ATO_SIGNING_KEY_JSON" > "$tmp_key"
          ATO_SIGNING_KEY="$tmp_key" ato publish --ci
          rm -f "$tmp_key"
