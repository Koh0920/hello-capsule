name: Publish Capsule to Ato Store

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ato CLI (Pinned & Verified)
        env:
          ATO_VERSION: "0.3.5"
          ATO_CHECKSUM: "8ea2e149745d89e68a0211c4353f33243ef2388354396ad0424500cd39e02343"
        run: |
          set -euo pipefail
          curl -fsSL -o ato.tar.gz "https://dl.ato.run/ato/releases/${ATO_VERSION}/ato-x86_64-unknown-linux-gnu.tar.gz"
          echo "${ATO_CHECKSUM}  ato.tar.gz" | sha256sum -c -
          tar -xzf ato.tar.gz
          chmod +x ./ato
          sudo mv ./ato /usr/local/bin/ato
          rm -f ato.tar.gz

      - name: Publish to Ato Store
        env:
          ATO_SIGNING_KEY_JSON: ${ secrets.ATO_SIGNING_KEY_JSON }
        run: |
          set -euo pipefail
          if [ -n "${ATO_SIGNING_KEY_JSON:-}" ]; then
            tmp_key="$(mktemp /tmp/ato-ci-signing-key.XXXXXX)"
            printf '%s' "$ATO_SIGNING_KEY_JSON" > "$tmp_key"
            ATO_SIGNING_KEY="$tmp_key" ato publish --ci
            rm -f "$tmp_key"
          else
            echo "ATO_SIGNING_KEY_JSON is not set; continuing in keyless mode."
            ato publish --ci
          fi
