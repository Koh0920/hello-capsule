schema_version = "0.3"
name = "hello-capsule"
version = "0.3.0"
type = "app"
default_target = "main"

[targets.main]
runtime = "source"
driver = "python"
runtime_version = "3.11"
runtime_tools = { node = "20" }
# Declared server port: lets Ato synthesize an honest TCP readiness probe
# (the runtime reports Ready only after this port actually accepts).
port = 8000
build = "npm install && npm run build"
run = "python -m uvicorn app.main:app --host 127.0.0.1 --port 8000"

[isolation]
allow_env = [
    "DATABASE_URL"
]

[network]
egress_allow = [
    "localhost",
    "127.0.0.1"
]

# Managed Cloud web target — a dependency-free Node server honoring $PORT.
# The MVP Managed Cloud runner (node:20-alpine, no build) starts this, injects
# PORT, probes 127.0.0.1:port, and serves it at /__ato_app/.
[targets.web]
runtime = "source"
runtime_version = "20"
run = "node server.js"
port = 3000
